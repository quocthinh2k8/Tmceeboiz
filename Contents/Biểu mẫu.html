<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Đóng góp ý kiến</title>
</head>
<body>

    <h2>Đóng góp ý kiến cho thư viện của nhà trường</h2>

    <form action="#" method="post">
        <h3>1. Thông tin về người góp ý</h3>
        <label for="ho_ten">Họ và tên: </label>
        <input type="text" id="ho_ten" name="ho_ten"><br><br>

        <label for="email">Địa chỉ email: </label>
        <input type="email" id="email" name="email"><br><br>

        <h3>2. Đóng góp ý kiến</h3>
        <label style="vertical-align: top;" for="y_kien">Ý kiến đóng góp: </label>
        <textarea id="y_kien" name="y_kien" rows="6" cols="45"></textarea>
    </form>

</body>
</html>
