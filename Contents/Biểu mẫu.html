<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Biểu mẫu đóng góp ý kiến (Hoàn chỉnh)</title>
    <style>
        /* CSS để căn lề và tạo kiểu cho biểu mẫu */
        body {
            font-family: "Times New Roman", Times, serif; /* Phông chữ giống trong sách */
            padding: 20px;
            line-height: 1.6;
        }

        .form-container {
            max-width: 800px;
            margin: 0 auto;
        }

        h1, h3 {
            margin-top: 0;
            color: #333;
        }

        h1 {
            font-size: 24px;
            margin-bottom: 25px;
        }

        h3 {
            font-size: 18px;
            margin-top: 20px;
            margin-bottom: 10px;
        }

        .row {
            margin-bottom: 15px;
            display: flex;
            align-items: flex-start;
        }

        /* Căn lề cho các nhãn (label) */
        label {
            display: inline-block;
            width: 120px;
            text-align: left;
            margin-right: 10px;
            font-weight: bold; /* Làm đậm nhãn để giống hình */
        }

        input[type="text"],
        input[type="email"],
        textarea {
            width: calc(100% - 140px); /* Căn chỉnh độ rộng trường nhập liệu */
            padding: 8px;
            border: 1px solid #ccc;
            border-radius: 4px;
            box-sizing: border-box;
        }

        textarea {
            height: 150px;
            resize: vertical; /* Cho phép thay đổi kích thước theo chiều dọc */
        }

        /* Thẻlabel bao quanh checkbox và text */
        .checkbox-label {
            width: auto;
            text-align: left;
            margin-right: 0;
            font-weight: normal; /* Không làm đậm cho các mục checkbox */
            display: block;
            margin-bottom: 5px;
        }

        .checkbox-list {
            margin-top: 25px;
        }

        .checkbox-list p {
            margin-top: 0;
            margin-bottom: 10px;
            font-weight: bold;
        }

        .submit-row {
            margin-top: 30px;
            text-align: left;
        }

        button[type="submit"] {
            padding: 10px 20px;
            font-size: 16px;
            cursor: pointer;
            background-color: #f0f0f0;
            border: 1px solid #ccc;
            border-radius: 4px;
        }

        button[type="submit"]:hover {
            background-color: #e0e0e0;
        }
    </style>
</head>
<body>

    <div class="form-container">
        <h1 style="font-weight: bold; text-align: left;">Đóng góp ý kiến cho thư viện của nhà trường</h1>

        <form action="#" method="post">
            <h3 style="font-weight: bold;">1. Thông tin về người góp ý</h3>
            <div class="row">
                <label for="fullname">Họ và tên:</label>
                <input type="text" id="fullname" name="fullname">
            </div>
            <div class="row">
                <label for="email">Địa chỉ email:</label>
                <input type="email" id="email" name="email">
            </div>

            <h3 style="font-weight: bold;">2. Đóng góp ý kiến</h3>
            <div class="row">
                <label for="feedback">Ý kiến đóng góp:</label>
                <textarea id="feedback" name="feedback"></textarea>
            </div>

            <div class="checkbox-list">
                <p>Thể loại cần bổ sung thêm sách</p>
                
                <label class="checkbox-label">
                    <input type="checkbox" name="genre[]" value="truyen-ngan"> 
                    Truện ngắn
                </label>
                <label class="checkbox-label">
                    <input type="checkbox" name="genre[]" value="ky-nang-song"> 
                    Kỹ năng sống
                </label>
                <label class="checkbox-label">
                    <input type="checkbox" name="genre[]" value="cntt"> 
                    Công nghệ thông tin
                </label>
                <label class="checkbox-label">
                    <input type="checkbox" name="genre[]" value="truyen-tranh"> 
                    Truyện tranh
                </label>
                <label class="checkbox-label">
                    <input type="checkbox" name="genre[]" value="lich-su"> 
                    Lịch sử
                </label>
            </div>

            <div class="submit-row">
                <button type="submit">Góp ý</button>
            </div>

            </form>
    </div>

</body>
</html>
